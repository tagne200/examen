version: '3.8'

services:
  # Base de données PostgreSQL (simule AWS RDS)
  postgres:
    image: postgres:15-alpine
    container_name: digitrans-postgres
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: SecurePassword123!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - digitrans-network

  # Cache Redis (simule AWS ElastiCache)
  redis:
    image: redis:7-alpine
    container_name: digitrans-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - digitrans-network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digitrans-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:SecurePassword123!@postgres:5432/crm_db
      REDIS_URL: redis://redis:6379/0
      AZURE_CLIENT_ID: dev-client-id
      AZURE_CLIENT_SECRET: dev-secret
      AZURE_TENANT_ID: dev-tenant-id
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - digitrans-network

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: digitrans-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - digitrans-network

volumes:
  postgres_data:
    driver: local

networks:
  digitrans-network:
    driver: bridge
