name: CI/CD Pipeline - DIGITRANS-CM CRM

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # ============= JOB 1 : TESTS BACKEND =============
  test-backend:
    name: Tests Backend API
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crm_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Create .env file
        run: |
          cd backend
          cat > .env << EOF
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/crm_test_db
          AZURE_TENANT_ID=test-tenant-id
          AZURE_CLIENT_ID=test-client-id
          AZURE_CLIENT_SECRET=test-secret
          SECRET_KEY=test-secret-key-for-ci-cd-pipeline
          ALLOWED_ORIGINS=http://localhost:3000
          EOF
      
      - name: Initialize database
        run: |
          cd backend
          python -m app.database init
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crm_test_db
      
      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crm_test_db
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  # ============= JOB 2 : LINTING & SECURITY =============
  lint-and-security:
    name: Linting & Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linting tools
        run: |
          pip install flake8 black pylint bandit safety
      
      - name: Run Black (code formatting check)
        run: |
          cd backend
          black --check app/ || echo "Code formatting issues found"
        continue-on-error: true
      
      - name: Run Flake8 (linting)
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --exclude=__pycache__ || echo "Linting issues found"
        continue-on-error: true
      
      - name: Run Bandit (security scan)
        run: |
          cd backend
          bandit -r app/ -f json -o bandit-report.json || echo "Security issues found"
        continue-on-error: true
      
      - name: Check dependencies vulnerabilities
        run: |
          cd backend
          pip install -r requirements.txt
          safety check --json || echo "Vulnerable dependencies found"
        continue-on-error: true

  # ============= JOB 3 : TERRAFORM INFRASTRUCTURE =============
  terraform:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false
      
      - name: Terraform Init
        run: |
          cd infrastructure/aws
          terraform init
      
      - name: Terraform Plan
        run: |
          cd infrastructure/aws
          terraform plan -var-file=../environments/production/terraform.tfvars -out=tfplan
      
      - name: Terraform Apply
        run: |
          cd infrastructure/aws
          terraform apply -auto-approve tfplan

  # ============= JOB 4 : BUILD & PUSH DOCKER IMAGE =============
  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test-backend, terraform]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: digitrans-crm-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ============= JOB 5 : DEPLOY TO KUBERNETES (EKS) =============
  deploy-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name digitrans-crm-cluster --region af-south-1
      
      - name: Deploy to Kubernetes
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd infrastructure/kubernetes
          kubectl apply -f namespace.yaml
          kubectl set image deployment/crm-api crm-api=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.af-south-1.amazonaws.com/digitrans-crm-api:$IMAGE_TAG -n digitrans-crm
          kubectl rollout status deployment/crm-api -n digitrans-crm
      
      - name: Deploy Frontend to S3
        run: |
          cd frontend
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --exclude "*.md" \
            --exclude ".git/*" \
            --delete
      
      - name: Invalidate CloudFront cache
        if: false  # Désactivé temporairement - CloudFront pas encore créé
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ============= JOB 6 : NOTIFY =============
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [deploy-kubernetes]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          echo "Pipeline completed!"
          echo "Status: ${{ job.status }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
