name: CI/CD Pipeline - DIGITRANS-CM CRM

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # ============= JOB 1 : TESTS BACKEND =============
  test-backend:
    name: Tests Backend API
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crm_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Create .env file
        run: |
          cd backend
          cat > .env << EOF
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/crm_test_db
          AZURE_TENANT_ID=test-tenant-id
          AZURE_CLIENT_ID=test-client-id
          AZURE_CLIENT_SECRET=test-secret
          SECRET_KEY=test-secret-key-for-ci-cd-pipeline
          ALLOWED_ORIGINS=http://localhost:3000
          EOF
      
      - name: Initialize database
        run: |
          cd backend
          python -m app.database init
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crm_test_db
      
      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crm_test_db
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  # ============= JOB 2 : LINTING & SECURITY =============
  lint-and-security:
    name: Linting & Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linting tools
        run: |
          pip install flake8 black pylint bandit safety
      
      - name: Run Black (code formatting check)
        run: |
          cd backend
          black --check app/ || echo "Code formatting issues found"
        continue-on-error: true
      
      - name: Run Flake8 (linting)
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --exclude=__pycache__ || echo "Linting issues found"
        continue-on-error: true
      
      - name: Run Bandit (security scan)
        run: |
          cd backend
          bandit -r app/ -f json -o bandit-report.json || echo "Security issues found"
        continue-on-error: true
      
      - name: Check dependencies vulnerabilities
        run: |
          cd backend
          pip install -r requirements.txt
          safety check --json || echo "Vulnerable dependencies found"
        continue-on-error: true

  # ============= JOB 3 : TERRAFORM INFRASTRUCTURE =============
  terraform:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      TF_STATE_KEY: production/terraform.tfstate
      TF_LOCK_TABLE: digitrans-terraform-locks
      AWS_REGION: af-south-1
      TFVARS: ../environments/production/terraform.tfvars

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      # ── Étape 1 : créer le bucket S3 + table DynamoDB si absents ──────────
      - name: Bootstrap Terraform state backend
        run: |
          # Récupérer l'account ID depuis les credentials AWS déjà configurés
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TF_STATE_BUCKET="digitrans-terraform-state-${AWS_ACCOUNT_ID}"
          echo "TF_STATE_BUCKET=${TF_STATE_BUCKET}" >> "$GITHUB_ENV"
          echo "Account ID : ${AWS_ACCOUNT_ID} — Bucket : ${TF_STATE_BUCKET}"

          # Bucket S3 pour l'état
          if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            aws s3 mb "s3://$TF_STATE_BUCKET" --region "$AWS_REGION"
            aws s3api put-bucket-versioning \
              --bucket "$TF_STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$TF_STATE_BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "$TF_STATE_BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            echo "Bucket S3 créé : $TF_STATE_BUCKET"
          else
            echo "Bucket S3 déjà existant : $TF_STATE_BUCKET"
          fi

          # Table DynamoDB pour le lock d'état (optionnel — nécessite dynamodb:CreateTable)
          # Pour activer : appliquer iam-additional-policy.json à l'utilisateur github-actions-digitrans
          # et décommenter dynamodb_table dans infrastructure/aws/main.tf
          if aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" 2>/dev/null; then
            echo "Table DynamoDB déjà existante : $TF_LOCK_TABLE"
          elif aws dynamodb create-table \
            --table-name "$TF_LOCK_TABLE" \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region "$AWS_REGION" 2>/dev/null; then
            echo "Table DynamoDB créée : $TF_LOCK_TABLE"
          else
            echo "AVERTISSEMENT : impossible de créer la table DynamoDB (permission manquante). Le verrouillage d'état est désactivé."
          fi

      # ── Étape 2 : init avec backend S3 persistant ─────────────────────────
      - name: Terraform Init
        run: |
          cd infrastructure/aws
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -reconfigure

      # ── Étape 3 : importer les ressources AWS déjà existantes ─────────────
      # Idempotent : skip si déjà dans l'état, || true si la ressource n'existe pas
      - name: Import existing AWS resources into Terraform state
        run: |
          cd infrastructure/aws

          import_if_needed() {
            local addr="$1"
            local id="$2"
            if terraform state show "$addr" &>/dev/null; then
              echo "SKIP (already in state): $addr"
            else
              echo "IMPORTING: $addr  =>  $id"
              terraform import -var-file="$TFVARS" "$addr" "$id" || true
            fi
          }

          # ── Ressources à noms fixes (depuis les erreurs du log) ──────────
          import_if_needed "aws_ecr_repository.crm_api" \
            "digitrans-crm-crm-api"

          import_if_needed "aws_iam_role.eks_cluster" \
            "digitrans-crm-eks-cluster-role"

          import_if_needed "aws_iam_role.eks_nodes" \
            "digitrans-crm-eks-node-role"

          import_if_needed "aws_iam_role.rds_monitoring[0]" \
            "digitrans-crm-production-rds-monitoring-role"

          import_if_needed "aws_db_parameter_group.main" \
            "digitrans-crm-production-db-params"

          # Secrets Manager : import par ARN
          SECRET_ARN=$(aws secretsmanager describe-secret \
            --secret-id "digitrans-crm-production/db/password" \
            --region "$AWS_REGION" \
            --query 'ARN' --output text 2>/dev/null || echo "")
          if [ -n "$SECRET_ARN" ] && [ "$SECRET_ARN" != "None" ]; then
            import_if_needed "aws_secretsmanager_secret.db_password" "$SECRET_ARN"
          fi

          # SNS Topic : import par ARN
          SNS_ARN=$(aws sns list-topics --region "$AWS_REGION" \
            --query "Topics[?contains(TopicArn,'digitrans-crm-production-alerts')].TopicArn | [0]" \
            --output text 2>/dev/null || echo "")
          if [ -n "$SNS_ARN" ] && [ "$SNS_ARN" != "None" ]; then
            import_if_needed "aws_sns_topic.alerts" "$SNS_ARN"
          fi

          # ── Sélection du VPC de référence ────────────────────────────────────
          # Priorité : VPC de l'instance RDS → seul VPC cohérent avec le subnet group et la DB
          VPC_ID=""
          RDS_STATUS=""

          RDS_STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier "digitrans-crm-production-db" \
            --region "$AWS_REGION" \
            --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null || echo "")

          if [ -n "$RDS_STATUS" ] && [ "$RDS_STATUS" != "None" ]; then
            echo "Instance RDS trouvée (statut: $RDS_STATUS) → son VPC devient la référence"
            VPC_ID=$(aws rds describe-db-subnet-groups \
              --db-subnet-group-name "digitrans-crm-production-db-subnet-group" \
              --region "$AWS_REGION" \
              --query 'DBSubnetGroups[0].VpcId' --output text 2>/dev/null || echo "")
            echo "VPC de référence (depuis RDS) : $VPC_ID"
          fi

          # Fallback : VPC taggé avec le plus de subnets
          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            mapfile -t ALL_VPCS < <(aws ec2 describe-vpcs \
              --filters "Name=tag:Project,Values=digitrans-crm" \
                        "Name=tag:Environment,Values=production" \
              --query 'Vpcs[*].VpcId' --output text --region "$AWS_REGION" 2>/dev/null | tr '\t' '\n')
            MAX=0
            for v in "${ALL_VPCS[@]}"; do
              C=$(aws ec2 describe-subnets \
                --filters "Name=vpc-id,Values=$v" \
                --query 'length(Subnets)' --output text --region "$AWS_REGION" 2>/dev/null || echo "0")
              if [ "$C" -gt "$MAX" ]; then MAX=$C; VPC_ID=$v; fi
            done
            echo "VPC de référence (par tags, fallback) : $VPC_ID"
          fi

          # ── Vérification cohérence : purge si VPC en état ≠ VPC de référence ─
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            if terraform state show "aws_vpc.main" &>/dev/null; then
              STATE_VPC=$(terraform state show "aws_vpc.main" 2>/dev/null \
                | grep -E '^\s+id\s+=' | sed 's/.*= *"\(.*\)"/\1/')
              if [ -n "$STATE_VPC" ] && [ "$STATE_VPC" != "$VPC_ID" ]; then
                echo "INCOHÉRENCE DÉTECTÉE : VPC en état ($STATE_VPC) ≠ VPC référence ($VPC_ID)"
                echo "Purge des ressources réseau de l'état Terraform pour réimport cohérent..."
                for res in \
                  "aws_vpc.main" \
                  "aws_internet_gateway.main" \
                  "aws_subnet.public[0]" "aws_subnet.public[1]" \
                  "aws_subnet.private[0]" "aws_subnet.private[1]" \
                  "aws_nat_gateway.main[0]" "aws_nat_gateway.main[1]" \
                  "aws_eip.nat[0]" "aws_eip.nat[1]" \
                  "aws_security_group.rds" \
                  "aws_db_subnet_group.main"; do
                  terraform state rm "$res" 2>/dev/null || true
                done
                echo "Purge terminée — réimport depuis VPC $VPC_ID"
              else
                echo "VPC en état cohérent ($STATE_VPC) — pas de purge nécessaire"
              fi
            fi
          fi

          # ── Import des ressources réseau depuis le VPC de référence ──────────
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            import_if_needed "aws_vpc.main" "$VPC_ID"

            # DB Subnet Group (dans le même VPC que la RDS)
            SG_VPC=$(aws rds describe-db-subnet-groups \
              --db-subnet-group-name "digitrans-crm-production-db-subnet-group" \
              --region "$AWS_REGION" \
              --query 'DBSubnetGroups[0].VpcId' --output text 2>/dev/null || echo "")
            [ -n "$SG_VPC" ] && [ "$SG_VPC" != "None" ] && \
              import_if_needed "aws_db_subnet_group.main" "digitrans-crm-production-db-subnet-group"

            # Instance RDS
            [ -n "$RDS_STATUS" ] && [ "$RDS_STATUS" != "None" ] && \
              import_if_needed "aws_db_instance.main" "digitrans-crm-production-db"

            # Internet Gateway
            IGW_ID=$(aws ec2 describe-internet-gateways \
              --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
              --query 'InternetGateways[0].InternetGatewayId' \
              --output text --region "$AWS_REGION" 2>/dev/null || echo "")
            [ -n "$IGW_ID" ] && [ "$IGW_ID" != "None" ] && \
              import_if_needed "aws_internet_gateway.main" "$IGW_ID"

            # Subnets publics (du VPC de référence uniquement)
            mapfile -t PUBLIC_SUBNETS < <(aws ec2 describe-subnets \
              --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Type,Values=Public" \
              --query 'Subnets[*].SubnetId' --output text --region "$AWS_REGION" \
              | tr '\t' '\n')
            for i in "${!PUBLIC_SUBNETS[@]}"; do
              import_if_needed "aws_subnet.public[$i]" "${PUBLIC_SUBNETS[$i]}"
            done

            # Subnets privés (du VPC de référence uniquement)
            mapfile -t PRIVATE_SUBNETS < <(aws ec2 describe-subnets \
              --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Type,Values=Private" \
              --query 'Subnets[*].SubnetId' --output text --region "$AWS_REGION" \
              | tr '\t' '\n')
            for i in "${!PRIVATE_SUBNETS[@]}"; do
              import_if_needed "aws_subnet.private[$i]" "${PRIVATE_SUBNETS[$i]}"
            done

            # NAT Gateways (du VPC de référence uniquement)
            mapfile -t NAT_GWS < <(aws ec2 describe-nat-gateways \
              --filter "Name=vpc-id,Values=$VPC_ID" "Name=state,Values=available" \
              --query 'NatGateways[*].NatGatewayId' --output text --region "$AWS_REGION" \
              | tr '\t' '\n')
            for i in "${!NAT_GWS[@]}"; do
              import_if_needed "aws_nat_gateway.main[$i]" "${NAT_GWS[$i]}"
            done

            # EIPs : uniquement celles des NAT Gateways du VPC de référence
            # (évite d'importer les EIPs orphelines des runs précédents)
            mapfile -t NAT_EIPS < <(aws ec2 describe-nat-gateways \
              --filter "Name=vpc-id,Values=$VPC_ID" "Name=state,Values=available" \
              --query 'NatGateways[*].NatGatewayAddresses[0].AllocationId' \
              --output text --region "$AWS_REGION" | tr '\t' '\n')
            for i in "${!NAT_EIPS[@]}"; do
              import_if_needed "aws_eip.nat[$i]" "${NAT_EIPS[$i]}"
            done

            # Security Group RDS
            SG_ID=$(aws ec2 describe-security-groups \
              --filters "Name=vpc-id,Values=$VPC_ID" \
                        "Name=group-name,Values=digitrans-crm-production-rds-sg" \
              --query 'SecurityGroups[0].GroupId' --output text --region "$AWS_REGION" 2>/dev/null || echo "")
            [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ] && \
              import_if_needed "aws_security_group.rds" "$SG_ID"
          fi

          # ── EKS Cluster et Node Group ─────────────────────────────────────────
          EKS_STATUS=$(aws eks describe-cluster \
            --name "digitrans-crm-cluster" \
            --region "$AWS_REGION" \
            --query 'cluster.status' --output text 2>/dev/null || echo "")
          if [ -n "$EKS_STATUS" ] && [ "$EKS_STATUS" != "None" ]; then
            echo "Cluster EKS trouvé (statut: $EKS_STATUS)"
            import_if_needed "aws_eks_cluster.main" "digitrans-crm-cluster"
            NG_STATUS=$(aws eks describe-nodegroup \
              --cluster-name "digitrans-crm-cluster" \
              --nodegroup-name "digitrans-crm-node-group" \
              --region "$AWS_REGION" \
              --query 'nodegroup.status' --output text 2>/dev/null || echo "")
            [ -n "$NG_STATUS" ] && [ "$NG_STATUS" != "None" ] && \
              import_if_needed "aws_eks_node_group.main" "digitrans-crm-cluster:digitrans-crm-node-group"
          fi

      # ── Étape 4 : Plan + Apply ────────────────────────────────────────────
      - name: Terraform Plan
        run: |
          cd infrastructure/aws
          terraform plan -var-file="$TFVARS" -out=tfplan

      - name: Terraform Apply
        run: |
          cd infrastructure/aws
          terraform apply -auto-approve tfplan

  # ============= JOB 4 : BUILD & PUSH DOCKER IMAGE =============
  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test-backend, terraform]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: digitrans-crm-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ============= JOB 5 : DEPLOY TO KUBERNETES (EKS) =============
  deploy-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name digitrans-crm-cluster --region af-south-1
      
      - name: Deploy to Kubernetes
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd infrastructure/kubernetes
          kubectl apply -f namespace.yaml
          kubectl set image deployment/crm-api crm-api=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.af-south-1.amazonaws.com/digitrans-crm-api:$IMAGE_TAG -n digitrans-crm
          kubectl rollout status deployment/crm-api -n digitrans-crm
      
      - name: Deploy Frontend to S3
        run: |
          cd frontend
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --exclude "*.md" \
            --exclude ".git/*" \
            --delete
      
      - name: Invalidate CloudFront cache
        if: false  # Désactivé temporairement - CloudFront pas encore créé
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ============= JOB 6 : NOTIFY =============
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [deploy-kubernetes]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          echo "Pipeline completed!"
          echo "Status: ${{ job.status }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
