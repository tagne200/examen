name: CI/CD Pipeline - DIGITRANS-CM CRM

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # ============= JOB 1 : TESTS BACKEND =============
  test-backend:
    name: Tests Backend API
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crm_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Create .env file
        run: |
          cd backend
          cat > .env << EOF
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/crm_test_db
          AZURE_TENANT_ID=test-tenant-id
          AZURE_CLIENT_ID=test-client-id
          AZURE_CLIENT_SECRET=test-secret
          SECRET_KEY=test-secret-key-for-ci-cd-pipeline
          ALLOWED_ORIGINS=http://localhost:3000
          EOF
      
      - name: Initialize database
        run: |
          cd backend
          python -m app.database init
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crm_test_db
      
      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crm_test_db
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  # ============= JOB 2 : LINTING & SECURITY =============
  lint-and-security:
    name: Linting & Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linting tools
        run: |
          pip install flake8 black pylint bandit safety
      
      - name: Run Black (code formatting check)
        run: |
          cd backend
          black --check app/ || echo "Code formatting issues found"
        continue-on-error: true
      
      - name: Run Flake8 (linting)
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --exclude=__pycache__ || echo "Linting issues found"
        continue-on-error: true
      
      - name: Run Bandit (security scan)
        run: |
          cd backend
          bandit -r app/ -f json -o bandit-report.json || echo "Security issues found"
        continue-on-error: true
      
      - name: Check dependencies vulnerabilities
        run: |
          cd backend
          pip install -r requirements.txt
          safety check --json || echo "Vulnerable dependencies found"
        continue-on-error: true

  # ============= JOB 3 : BUILD DOCKER IMAGE =============
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-backend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          cd backend
          docker build -t digitrans-crm-api:${{ github.sha }} .
          docker tag digitrans-crm-api:${{ github.sha }} digitrans-crm-api:latest
      
      - name: Test Docker image
        run: |
          docker run --rm digitrans-crm-api:latest python --version

  # ============= JOB 4 : DEPLOY TO AWS (Production) =============
  deploy-aws:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [test-backend, lint-and-security, build-docker]
    # Déployer uniquement sur push vers main (pas sur pull_request)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1
      
      - name: Deploy Frontend to S3
        run: |
          cd frontend
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --exclude "*.md" \
            --exclude ".git/*" \
            --delete
      
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
      
      - name: Deploy Backend to Lambda (if using Lambda)
        run: |
          cd backend
          pip install -r requirements.txt -t package/
          cp -r app package/
          cd package
          zip -r ../deployment-package.zip .
          cd ..
          aws lambda update-function-code \
            --function-name digitrans-crm-api \
            --zip-file fileb://deployment-package.zip
        continue-on-error: true

  # ============= JOB 5 : NOTIFY =============
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [deploy-aws]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          echo "Pipeline completed!"
          echo "Status: ${{ job.status }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
